name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Override .cargo/config.toml target-cpu=native — CI runners vary
  RUSTFLAGS: ""

jobs:
  check:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly-2026-04-02
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly-2026-04-02
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace

  build-release:
    name: Release Build
    needs: check
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly-2026-04-02
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --workspace --release

  ffi-bindings-drift:
    # Verifies the committed Kotlin + Swift bindings under
    # wick-ffi/bindings/ stay in sync with the Rust `#[uniffi::*]`
    # surface. Regenerates via `uniffi-bindgen` (the in-repo binary
    # target) against the freshly-built debug dylib and fails if
    # `git diff` shows changes — signalling someone touched the FFI
    # exports without running `just bindings` and committing the result.
    #
    # Skips Kotlin/Swift compilation: we're only checking that the
    # generator produces the same bytes for the same input. No JDK /
    # Swift toolchain needed beyond `ktlint` (which uniffi-bindgen
    # invokes on the Kotlin output so the committed file stays
    # formatter-stable).
    name: FFI Bindings Drift
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly-2026-04-02
      - uses: Swatinem/rust-cache@v2
      - name: Install ktlint
        # Pin the ktlint version + verify its sha256 so the formatter
        # output is reproducible across CI runs + developer workstations
        # AND so a compromised mirror can't slip a different binary past
        # the drift check. Bump in lockstep with whatever's documented
        # in wick-ffi/README.md (regenerate the bindings in the same PR).
        #
        # `curl --fail --proto '=https' --tlsv1.2` hardens the download
        # against silent HTTP errors and legacy TLS downgrades.
        # The sha256 below is for the ktlint 1.8.0 standalone release
        # binary from pinterest/ktlint; bumping the version requires
        # recomputing it (locally: `shasum -a 256 ktlint`).
        run: |
          KTLINT_VERSION=1.8.0
          KTLINT_SHA256=a3fd620207d5c40da6ca789b95e7f823c54e854b7fade7f613e91096a3706d75
          curl --fail --proto '=https' --tlsv1.2 -sSLo /tmp/ktlint \
            "https://github.com/pinterest/ktlint/releases/download/${KTLINT_VERSION}/ktlint"
          echo "${KTLINT_SHA256}  /tmp/ktlint" | sha256sum -c -
          chmod +x /tmp/ktlint
          sudo mv /tmp/ktlint /usr/local/bin/ktlint
          ktlint --version
      - name: Build wick-ffi (cdylib for bindgen)
        run: cargo build -p wick-ffi
      - name: Regenerate bindings
        # `--features bindgen` opts into the crate's `bindgen` feature,
        # which lights up `uniffi/cli`. Library consumers never pay for
        # this feature; only the binary target needs it.
        run: |
          cargo run -q -p wick-ffi --bin uniffi-bindgen --features bindgen -- generate \
            --library target/debug/libwick_ffi.so \
            --language kotlin \
            --out-dir wick-ffi/bindings/kotlin
          cargo run -q -p wick-ffi --bin uniffi-bindgen --features bindgen -- generate \
            --library target/debug/libwick_ffi.so \
            --language swift \
            --out-dir wick-ffi/bindings/swift
      - name: Diff committed bindings
        run: |
          if [ -n "$(git status --porcelain wick-ffi/bindings)" ]; then
            echo "::error::Vendored bindings under wick-ffi/bindings/ are out of date."
            echo "Run 'just bindings' locally and commit the resulting diff."
            git --no-pager diff wick-ffi/bindings
            exit 1
          fi

  android-abis:
    # Cross-compiles `wick-ffi` to every Android ABI supported by the
    # Android NDK (arm64-v8a, armeabi-v7a, x86_64, x86). Verifies each
    # `.so` is a valid ELF of the right architecture and uploads the
    # release libraries as a CI artifact so consumers can grab a
    # Jetpack-friendly `jniLibs/` layout from the action run without
    # running the toolchain themselves.
    #
    # Matrix entry per ABI keeps the six-ish-minute cross-compile from
    # being the critical path on a green CI run: all four run in
    # parallel. Release profile mirrors the size target
    # (~2.5 MB/.so vs ~75 MB for debug with embedded debuginfo).
    name: Android ABI (${{ matrix.abi }})
    needs: check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            rust_target: aarch64-linux-android
          - abi: armeabi-v7a
            rust_target: armv7-linux-androideabi
          - abi: x86_64
            rust_target: x86_64-linux-android
          - abi: x86
            rust_target: i686-linux-android
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly-2026-04-02
          targets: ${{ matrix.rust_target }}
      - uses: Swatinem/rust-cache@v2
      # Install NDK. Pin to r27c — a validated stable release the
      # workspace builds against cleanly. Bumping is a one-line change:
      # update this version string (and the matching note in
      # wick-ffi/README.md) and re-run CI to confirm every ABI still
      # builds. The `cargo ndk` flag shape is compatible across recent
      # NDK majors so the pin is about toolchain + sysroot stability
      # across runs, not a hard constraint.
      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
          add-to-path: false
      - name: Install cargo-ndk
        # Pin to 4.x major — cargo-ndk 4.0 changed the flag shape
        # (`--target <abi>` is the current form; earlier releases
        # used `--platform` + `--arch`). Let cargo pick the latest
        # 4.x patch so security-fix releases get picked up.
        run: cargo install cargo-ndk --version '^4' --locked
      - name: Cross-compile wick-ffi
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cargo ndk --target ${{ matrix.abi }} build -p wick-ffi --release
      - name: Verify ELF shape
        # Catches a regression where `cargo build` succeeds but the
        # cdylib rule silently produces a host-arch binary. Assert
        # via `readelf -h`'s `Class:` + `Machine:` fields — those are
        # machine-readable ELF header values that don't drift across
        # distro versions the way `file(1)`'s human-readable string
        # does. `file` is kept for diagnostic output only.
        #
        # Catch-all `*)` arm is deliberate: if someone extends the
        # matrix with a new ABI and forgets to add an assertion
        # branch, this step fails loudly instead of silently
        # passing. Same pattern as exhaustive `match` on a Rust enum.
        run: |
          SO=target/${{ matrix.rust_target }}/release/libwick_ffi.so
          ls -la "$SO"
          file "$SO"
          HEADER=$(readelf -h "$SO")
          printf '%s\n' "$HEADER"
          case "${{ matrix.abi }}" in
            arm64-v8a)
              printf '%s\n' "$HEADER" | grep -Eq '^[[:space:]]*Class:[[:space:]]*ELF64$'
              printf '%s\n' "$HEADER" | grep -Eq '^[[:space:]]*Machine:[[:space:]]*AArch64$'
              ;;
            armeabi-v7a)
              printf '%s\n' "$HEADER" | grep -Eq '^[[:space:]]*Class:[[:space:]]*ELF32$'
              printf '%s\n' "$HEADER" | grep -Eq '^[[:space:]]*Machine:[[:space:]]*ARM$'
              ;;
            x86_64)
              printf '%s\n' "$HEADER" | grep -Eq '^[[:space:]]*Class:[[:space:]]*ELF64$'
              printf '%s\n' "$HEADER" | grep -Eq '^[[:space:]]*Machine:[[:space:]]*Advanced Micro Devices X86-64$'
              ;;
            x86)
              printf '%s\n' "$HEADER" | grep -Eq '^[[:space:]]*Class:[[:space:]]*ELF32$'
              printf '%s\n' "$HEADER" | grep -Eq '^[[:space:]]*Machine:[[:space:]]*Intel 80386$'
              ;;
            *)
              echo "::error::Unexpected ABI for ELF verification: ${{ matrix.abi }} — extend the case branch above." >&2
              exit 1
              ;;
          esac
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wick-ffi-android-${{ matrix.abi }}
          path: target/${{ matrix.rust_target }}/release/libwick_ffi.so
          # Per-run artifact; 7-day retention is enough to copy into
          # a consumer app's `src/main/jniLibs/<abi>/` for testing
          # without keeping stale binaries around.
          retention-days: 7

  ios-xcframework:
    # Cross-compiles wick-ffi to all three arm64-only Apple-platform
    # Rust targets and assembles `WickFFI.xcframework` ready for
    # Swift Package Manager / Xcode consumption. Three slices end up
    # in the framework:
    #   - ios-arm64           (real iPhones / iPads)
    #   - ios-arm64-simulator (Apple Silicon Mac iOS Simulator)
    #   - macos-arm64         (native Apple Silicon Macs)
    #
    # x86_64 slices are deliberately omitted: Apple stopped selling
    # Intel Macs in 2023 and modern consumer apps don't need to ship
    # for them. Drops the framework size from ~211 MB (with fat
    # slices) to ~125 MB and removes the `lipo -create` step entirely
    # — each slice is a single-arch staticlib piped straight into
    # xcodebuild. If an Intel-Mac consumer ever needs to be added
    # later, the structural change is reversible (bring back the
    # x86_64 rustup targets + lipo steps).
    #
    # Runs on macos-latest because xcodebuild only ships with Xcode.
    # Single job (no matrix) — the cross-compile builds are serial
    # inside the recipe; matrix wouldn't help because the final
    # xcodebuild step needs every slice in one workspace.
    #
    # The workflow-level `RUSTFLAGS: ""` env override is critical for
    # the macOS slice: `.cargo/config.toml` sets target-cpu=native
    # for the apple-darwin triple (workstation dev convenience), but
    # a CI runner's "native" CPU isn't a portable shipped-binary
    # baseline. Empty RUSTFLAGS forces the generic apple-darwin
    # baseline for distribution.
    name: iOS XCFramework
    needs: check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly-2026-04-02
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Show Xcode version
        # Diagnostic — pin tracking. macos-latest can shift Xcode
        # majors between runner image versions; logging here means a
        # silent xcodebuild behavior change shows up in the job log.
        run: xcodebuild -version
      - name: Build XCFramework
        # Mirrors `just ios-xcframework` exactly. Inlined because the
        # CI runner doesn't have `just` installed by default and
        # adding a setup-just step for a single-recipe job would be
        # more weight than the recipe itself.
        run: |
          set -euo pipefail
          cargo build -p wick-ffi --target aarch64-apple-ios --release
          cargo build -p wick-ffi --target aarch64-apple-ios-sim --release
          cargo build -p wick-ffi --target aarch64-apple-darwin --release
          OUT=target/xcframework-build
          rm -rf "$OUT"
          mkdir -p "$OUT/headers"
          cp wick-ffi/bindings/swift/wick_ffiFFI.h "$OUT/headers/"
          cp wick-ffi/bindings/swift/wick_ffiFFI.modulemap "$OUT/headers/module.modulemap"
          xcodebuild -create-xcframework \
              -library target/aarch64-apple-ios/release/libwick_ffi.a -headers "$OUT/headers" \
              -library target/aarch64-apple-ios-sim/release/libwick_ffi.a -headers "$OUT/headers" \
              -library target/aarch64-apple-darwin/release/libwick_ffi.a -headers "$OUT/headers" \
              -output "$OUT/WickFFI.xcframework"
      - name: Log XCFramework size
        # Logs the per-slice + total size so a future regression where
        # debuginfo slips back in (or a heavyweight dep accidentally
        # gets feature-gated on) shows up as a number in the build
        # log. No hard threshold — adjust when intentional size
        # changes happen.
        run: |
          set -euo pipefail
          XCF=target/xcframework-build/WickFFI.xcframework
          du -sh "$XCF"
          du -sh "$XCF"/*/libwick_ffi*.a
      - name: Swift smoke test (macOS)
        # Validates the entire pipeline end-to-end: compiles a small
        # Swift program against the freshly-built macOS staticlib +
        # the vendored Swift binding, runs it, asserts every surface
        # area we expect to work works (function call, enum
        # marshaling, record construction, error round-trip).
        #
        # Why macOS only: the Rust FFI surface is identical across
        # iOS device, iOS Simulator, and native macOS — same
        # generated Swift binding, same C ABI, same staticlib code
        # path. Running a native macOS test exercises the entire
        # cross-language integration without paying for an iOS
        # simulator boot. A regression that broke iOS specifically
        # (e.g., a platform-conditional staticlib symbol) wouldn't
        # be caught here, but those have not been a real failure
        # mode for UniFFI 0.31.
        #
        # `-import-objc-header` exposes the C declarations from
        # `wick_ffiFFI.h` without needing a separate module map +
        # SPM ceremony for a single-binary test. Foundation auto-
        # links on Apple platforms.
        run: |
          set -euo pipefail
          swiftc \
              wick-ffi/tests/swift/main.swift \
              wick-ffi/bindings/swift/wick_ffi.swift \
              -import-objc-header wick-ffi/bindings/swift/wick_ffiFFI.h \
              -L target/aarch64-apple-darwin/release \
              -lwick_ffi \
              -o /tmp/wick-swift-smoke
          /tmp/wick-swift-smoke
      - name: Verify XCFramework slices
        # Catches a regression where one slice silently has the wrong
        # architecture or platform — `Info.plist` advertises
        # `SupportedPlatform` + `SupportedPlatformVariant` +
        # `SupportedArchitectures`, all three must match what we
        # intended to build. Same exhaustive-check discipline as the
        # Android ABI matrix's `readelf` assertion.
        #
        # `SupportedPlatform == "ios"` is a critical guard: without
        # it, a misconfigured cross-compile that produced a macOS
        # staticlib (`aarch64-apple-darwin`) could still satisfy the
        # arch + variant checks since macOS arm64 staticlibs declare
        # the same architecture. The `==` on platform forces the
        # iOS-specific path.
        run: |
          set -euo pipefail
          XCF=target/xcframework-build/WickFFI.xcframework
          test -d "$XCF" || { echo "::error::xcframework not built"; exit 1; }
          plutil -p "$XCF/Info.plist"
          plutil -convert json -o - "$XCF/Info.plist" | python3 -c '
          import json, sys
          info = json.load(sys.stdin)
          libs = info["AvailableLibraries"]
          if len(libs) != 2:
              print(f"::error::expected 2 slices, got {len(libs)}", file=sys.stderr); sys.exit(1)
          # Build a set of (platform, archs-sorted-tuple, variant) keys
          # and check both expected slices are present. (*archs,
          # variant) avoids a tuple-concat dance that earlier readers
          # misread as a syntax bug.
          actual = {(l["SupportedPlatform"], *sorted(l["SupportedArchitectures"]), l.get("SupportedPlatformVariant", "")) for l in libs}
          expected = {
              ("ios",   "arm64", ""),          # iOS device
              ("ios",   "arm64", "simulator"), # iOS Simulator (Apple Silicon Mac host)
              ("macos", "arm64", ""),          # native Apple Silicon Mac
          }
          missing = expected - actual
          extra = actual - expected
          if missing or extra:
              print(f"::error::xcframework slices mismatch", file=sys.stderr)
              print(f"  expected: {expected}", file=sys.stderr)
              print(f"  actual:   {actual}", file=sys.stderr)
              if missing: print(f"  missing:  {missing}", file=sys.stderr)
              if extra:   print(f"  extra:    {extra}", file=sys.stderr)
              sys.exit(1)
          print("xcframework slices OK: ios-arm64 + ios-arm64-simulator + macos-arm64")
          '
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wick-ffi-ios-xcframework
          # Upload the directory (xcframework is a folder bundle on
          # disk); actions/upload-artifact zips it transparently.
          path: target/xcframework-build/WickFFI.xcframework
          retention-days: 7

  integration-test:
    name: Integration Tests (gated)
    needs: check
    # Only run on main-branch pushes and manual dispatch. Skipping PR runs
    # keeps PR cycle latency low — these tests download ~700 MB and are
    # meant as a correctness backstop, not per-PR regression guardrail.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # Cap at 15 min: a healthy run is ~2 min; a stuck download or
    # runaway prefill should fail loudly rather than consume CI minutes.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly-2026-04-02
      - uses: Swatinem/rust-cache@v2
      - name: Cache downloaded test models
        uses: actions/cache@v4
        with:
          path: target/tmp/wick-test-models
          # Bump the key suffix to invalidate after model-file changes.
          key: wick-test-models-lfm2-1.2b-q4_0-v1
      # NOTE: targeted to the download-gated test binaries only.
      # `cargo test -- --ignored` without `--test` would sweep every
      # #[ignore]'d test in the workspace (Metal microbenchmarks,
      # parity tests requiring WICK_TEST_MODEL, etc.), most of which
      # don't belong on an Ubuntu CI runner. `--features remote` is
      # required — the bundle downloader + `tests/common/download.rs`
      # shim both live behind that feature.
      - name: Run gated integration tests
        env:
          WICK_TEST_DOWNLOAD: "1"
        run: |
          cargo test -p wick --features remote \
            --test shift_real_model \
            --test bundle_download \
            --test bundle_from_id \
            -- --ignored
