name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Override .cargo/config.toml target-cpu=native ã CI runners vary
  RUSTFLAGS: ""

jobs:
  check:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly-2026-04-02
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly-2026-04-02
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace

  build-release:
    name: Release Build
    needs: check
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly-2026-04-02
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --workspace --release

  wasm-build:
    # Phase 3 of the FFI multi-target plan is `wick-wasm` (browser/Node
    # via wasm-bindgen, not UniFFI). Before any of that lands the
    # foundation needs to hold: `wick` core has to compile for
    # `wasm32-unknown-unknown` across the feature combos that the
    # wasm-bindgen wrapper crate (Phase 3.2) might enable. Phase 1.3
    # (PR #32) made `parallel`, `mmap`, `std-fs`, `disk-cache`,
    # `remote` opt-in for exactly this reason; this job is a
    # regression check that catches the moment something in core adds
    # a non-target-conditional `std::thread`, `std::fs`, sync
    # primitive, etc. that breaks the wasm32 build under any of the
    # supported feature combos.
    #
    # `remote` is intentionally NOT in the matrix ã `reqwest` doesn't
    # link on wasm32-unknown-unknown; wick-wasm will have its own
    # `fetch`-based adapter (Phase 3.x).
    name: Wasm Build (${{ matrix.features }})
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        features:
          - "--no-default-features"
          - "--no-default-features --features parallel,std-fs,disk-cache"
          - "--no-default-features --features mmap"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly-2026-04-02
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Check wasm32 compile
        run: cargo check -p wick ${{ matrix.features }} --target wasm32-unknown-unknown

  wick-wasm-pack:
    # Multi-target wasm-pack build. Each matrix entry produces one
    # consumer shape:
    #   - `bundler`: ESM with bundler-only `import * as wasm from
    #     "...wasm"` magic (webpack 5+, Vite, Rollup with the
    #     wasm plugin). Most common.
    #   - `web`: direct browser ESM that callers `init()` themselves
    #     before use. Right shape for `<script type="module">` and
    #     loaders without bundler-side wasm support.
    #   - `nodejs`: CommonJS for Node ã `require('@hyeonslab/wick-wasm')`
    #     without the experimental-wasm-modules dance.
    #
    # Three artifacts are uploaded so reviewers / downstream devs can
    # download whichever shape matches their consumer. The publish
    # workflow (deferred) will need to differentiate the npm package
    # names per target since wasm-pack writes the same scoped name
    # into all three pkg-*/package.json files today.
    #
    # `cargo build` regression check is preserved as a side-effect of
    # the wasm-pack pipeline (any of the three matrix entries failing
    # would catch a wick core regression).
    name: Wick-Wasm Pack (${{ matrix.target }})
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        target: [bundler, web, nodejs]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly-2026-04-02
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'v0.14.0'
      - name: Install binaryen (provides wasm-opt)
        run: sudo apt-get update && sudo apt-get install -y binaryen
      - name: Build wick-wasm npm package
        # `--scope hyeonslab` matches the package name advertised in
        # wick-wasm/README.md (`@hyeonslab/wick-wasm`). `--out-dir`
        # gives each matrix entry its own directory so the artifact
        # uploads don't collide.
        run: |
          wasm-pack build wick-wasm \
            --target ${{ matrix.target }} \
            --release \
            --scope hyeonslab \
            --out-dir pkg-${{ matrix.target }}
      - name: Check .wasm size budget
        # Hard cap on the post-wasm-opt cdylib size. Catches the
        # next time something bloats the bundle silently. Crossing
        # the budget is intentional sometimes (a real new capability,
        # not a regression) ã when it happens, justify in the PR
        # description and bump `BUDGET_KB` here in the same commit.
        # Don't let a passing CI become a license to grow the wasm
        # without scrutiny.
        #
        # All three targets share the same wasm body (only the JS
        # glue differs); the gate fires per-target so any future
        # target-specific size regression surfaces immediately.
        #
        # Current floor (post wasm-opt -O3):
        #   PR #67 (manifest only):              174 KB
        #   PR #69 (engine + tokenizer):         1.2 MB  (+1.0 MB minijinja + LFM2)
        #   PR #70 (Session + generate):         1.2 MB  (~unchanged)
        #   PR #72 (applyChatTemplate):          2.0 MB  (+800 KB minijinja render)
        # Budget:                                2.5 MB  (~25% headroom)
        #
        # Plain bash arithmetic (no `numfmt` etc.) so this script
        # runs identically on the macOS / Linux developer machines
        # where contributors will sanity-check it locally.
        run: |
          set -euo pipefail
          PKG=wick-wasm/pkg-${{ matrix.target }}
          WASM=$PKG/wick_wasm_bg.wasm
          SIZE_BYTES=$(wc -c < "$WASM")
          BUDGET_KB=2560  # 2.5 MB
          BUDGET_BYTES=$((BUDGET_KB * 1024))
          # Display rounds UP to KB so a 2,560,001-byte file reads as
          # "2561 KB" not "2560 KB" ã keeps the human-readable line
          # honest with the byte-precision comparison below.
          SIZE_KB=$(( (SIZE_BYTES + 1023) / 1024 ))
          # Default $GITHUB_STEP_SUMMARY to /dev/null so a contributor
          # can copy this script and run it locally ã the variable is
          # only set inside GitHub Actions, and `set -u` would
          # otherwise abort on the redirect.
          SUMMARY=${GITHUB_STEP_SUMMARY:-/dev/null}
          {
            echo "## Wick-Wasm Pack output (${{ matrix.target }})"
            echo
            echo "**\`$WASM\`: ${SIZE_KB} KB / ${BUDGET_KB} KB budget**"
            echo
            echo '```'
            ls -lh "$PKG/"
            echo '```'
          } >> "$SUMMARY"
          # Compare in bytes so the gate is a true hard cap; comparing
          # in KB would let a file overshoot by up to 1023 bytes
          # before failing.
          if [ "$SIZE_BYTES" -gt "$BUDGET_BYTES" ]; then
            echo "::error file=.github/workflows/ci.yml::$WASM is ${SIZE_KB} KB (${SIZE_BYTES} B), over the ${BUDGET_KB} KB (${BUDGET_BYTES} B) budget. If this is intentional (new capability, not a regression), bump BUDGET_KB in the same commit and justify in the PR description."
            exit 1
          fi
          echo "$WASM: ${SIZE_KB} KB / ${BUDGET_KB} KB budget ã OK"
      - uses: actions/upload-artifact@v4
        with:
          name: wick-wasm-pkg-${{ matrix.target }}
          path: wick-wasm/pkg-${{ matrix.target }}/
          if-no-files-found: error
          retention-days: 30

  ffi-bindings-drift:
    # Verifies the committed Kotlin + Swift bindings under
    # wick-ffi/bindings/ stay in sync with the Rust `#[uniffi::*]`
    # surface. Regenerates via `uniffi-bindgen` (the in-repo binary
    # target) against the freshly-built debug dylib and fails if
    # `git diff` shows changes ã signalling someone touched the FFI
    # exports without running `just bindings` and committing the result.
    #
    # Skips Kotlin/Swift compilation: we're only checking that the
    # generator produces the same bytes for the same input. No JDK /
    # Swift toolchain needed beyond `ktlint` (which uniffi-bindgen
    # invokes on the Kotlin output so the committed file stays
    # formatter-stable).
    name: FFI Bindings Drift
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly-2026-04-02
      - uses: Swatinem/rust-cache@v2
      - name: Install ktlint
        # Pin the ktlint version + verify its sha256 so the formatter
        # output is reproducible across CI runs + developer workstations
        # AND so a compromised mirror can't slip a different binary past
        # the drift check. Bump in lockstep with whatever's documented
        # in wick-ffi/README.md (regenerate the bindings in the same PR).
        #
        # `curl --fail --proto '=https' --tlsv1.2` hardens the download
        # against silent HTTP errors and legacy TLS downgrades.
        # The sha256 below is for the ktlint 1.8.0 standalone release
        # binary from pinterest/ktlint; bumping the version requires
        # recomputing it (locally: `shasum -a 256 ktlint`).
        run: |
          KTLINT_VERSION=1.8.0
          KTLINT_SHA256=a3fd620207d5c40da6ca789b95e7f823c54e854b7fade7f613e91096a3706d75
          curl --fail --proto '=https' --tlsv1.2 -sSLo /tmp/ktlint \
            "https://github.com/pinterest/ktlint/releases/download/${KTLINT_VERSION}/ktlint"
          echo "${KTLINT_SHA256}  /tmp/ktlint" | sha256sum -c -
          chmod +x /tmp/ktlint
          sudo mv /tmp/ktlint /usr/local/bin/ktlint
          ktlint --version
      - name: Build wick-ffi (cdylib for bindgen)
        run: cargo build -p wick-ffi
      - name: Regenerate bindings
        # `--features bindgen` opts into the crate's `bindgen` feature,
        # which lights up `uniffi/cli`. Library consumers never pay for
        # this feature; only the binary target needs it.
        run: |
          cargo run -q -p wick-ffi --bin uniffi-bindgen --features bindgen -- generate \
            --library target/debug/libwick_ffi.so \
            --language kotlin \
            --out-dir wick-ffi/bindings/kotlin
          cargo run -q -p wick-ffi --bin uniffi-bindgen --features bindgen -- generate \
            --library target/debug/libwick_ffi.so \
            --language swift \
            --out-dir wick-ffi/bindings/swift
      - name: Diff committed bindings
        run: |
          if [ -n "$(git status --porcelain wick-ffi/bindings)" ]; then
            echo "::error::Vendored bindings under wick-ffi/bindings/ are out of date."
            echo "Run 'just bindings' locally and commit the resulting diff."
            git --no-pager diff wick-ffi/bindings
            exit 1
          fi

  android-abis:
    # Cross-compiles `wick-ffi` to every Android ABI supported by the
    # Android NDK (arm64-v8a, armeabi-v7a, x86_64, x86). Verifies each
    # `.so` is a valid ELF of the right architecture and uploads the
    # release libraries as a CI artifact so consumers can grab a
    # Jetpack-friendly `jniLibs/` layout from the action run without
    # running the toolchain themselves.
    #
    # Matrix entry per ABI keeps the six-ish-minute cross-compile from
    # being the critical path on a green CI run: all four run in
    # parallel. Release profile mirrors the size target
    # (~2.5 MB/.so vs ~75 MB for debug with embedded debuginfo).
    name: Android ABI (${{ matrix.abi }})
    needs: check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            rust_target: aarch64-linux-android
          - abi: armeabi-v7a
            rust_target: armv7-linux-androideabi
          - abi: x86_64
            rust_target: x86_64-linux-android
          - abi: x86
            rust_target: i686-linux-android
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly-2026-04-02
          targets: ${{ matrix.rust_target }}
      - uses: Swatinem/rust-cache@v2
      # Install NDK. Pin to r27c ã a validated stable release the
      # workspace builds against cleanly. Bumping is a one-line change:
      # update this version string (and the matching note in
      # wick-ffi/README.md) and re-run CI to confirm every ABI still
      # builds. The `cargo ndk` flag shape is compatible across recent
      # NDK majors so the pin is about toolchain + sysroot stability
      # across runs, not a hard constraint.
      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
          add-to-path: false
      - name: Install cargo-ndk
        # Pin to 4.x major ã cargo-ndk 4.0 changed the flag shape
        # (`--target <abi>` is the current form; earlier releases
        # used `--platform` + `--arch`). Let cargo pick the latest
        # 4.x patch so security-fix releases get picked up.
        run: cargo install cargo-ndk --version '^4' --locked
      - name: Cross-compile wick-ffi
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cargo ndk --target ${{ matrix.abi }} build -p wick-ffi --release
      - name: Verify ELF shape
        # Catches a regression where `cargo build` succeeds but the
        # cdylib rule silently produces a host-arch binary. Assert
        # via `readelf -h`'s `Class:` + `Machine:` fields ã those are
        # machine-readable ELF header values that don't drift across
        # distro versions the way `file(1)`'s human-readable string
        # does. `file` is kept for diagnostic output only.
        #
        # Catch-all `*)` arm is deliberate: if someone extends the
        # matrix with a new ABI and forgets to add an assertion
        # branch, this step fails loudly instead of silently
        # passing. Same pattern as exhaustive `match` on a Rust enum.
        run: |
          SO=target/${{ matrix.rust_target }}/release/libwick_ffi.so
          ls -la "$SO"
          file "$SO"
          HEADER=$(readelf -h "$SO")
          printf '%s\n' "$HEADER"
          case "${{ matrix.abi }}" in
            arm64-v8a)
              printf '%s\n' "$HEADER" | grep -Eq '^[[:space:]]*Class:[[:space:]]*ELF64$'
              printf '%s\n' "$HEADER" | grep -Eq '^[[:space:]]*Machine:[[:space:]]*AArch64$'
              ;;
            armeabi-v7a)
              printf '%s\n' "$HEADER" | grep -Eq '^[[:space:]]*Class:[[:space:]]*ELF32$'
              printf '%s\n' "$HEADER" | grep -Eq '^[[:space:]]*Machine:[[:space:]]*ARM$'
              ;;
            x86_64)
              printf '%s\n' "$HEADER" | grep -Eq '^[[:space:]]*Class:[[:space:]]*ELF64$'
              printf '%s\n' "$HEADER" | grep -Eq '^[[:space:]]*Machine:[[:space:]]*Advanced Micro Devices X86-64$'
              ;;
            x86)
              printf '%s\n' "$HEADER" | grep -Eq '^[[:space:]]*Class:[[:space:]]*ELF32$'
              printf '%s\n' "$HEADER" | grep -Eq '^[[:space:]]*Machine:[[:space:]]*Intel 80386$'
              ;;
            *)
              echo "::error::Unexpected ABI for ELF verification: ${{ matrix.abi }} ã extend the case branch above." >&2
              exit 1
              ;;
          esac
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wick-ffi-android-${{ matrix.abi }}
          path: target/${{ matrix.rust_target }}/release/libwick_ffi.so
          # Per-run artifact; 7-day retention is enough to copy into
          # a consumer app's `src/main/jniLibs/<abi>/` for testing
          # without keeping stale binaries around.
          retention-days: 7

  apple-xcframework:
    # Cross-compiles wick-ffi to all three arm64-only Apple-platform
    # Rust targets and assembles `WickFFI.xcframework` ready for
    # Swift Package Manager / Xcode consumption. Three slices end up
    # in the framework:
    #   - ios-arm64           (real iPhones / iPads)
    #   - ios-arm64-simulator (Apple Silicon Mac iOS Simulator)
    #   - macos-arm64         (native Apple Silicon Macs)
    #
    # x86_64 slices are deliberately omitted: Apple stopped selling
    # Intel Macs in 2023 and modern consumer apps don't need to ship
    # for them. Drops the framework size from ~211 MB (with fat
    # slices) to ~125 MB and removes the `lipo -create` step entirely
    # ã each slice is a single-arch staticlib piped straight into
    # xcodebuild. If an Intel-Mac consumer ever needs to be added
    # later, the structural change is reversible (bring back the
    # x86_64 rustup targets + lipo steps).
    #
    # Pinned to `macos-15` explicitly (Apple Silicon M1 runner image)
    # rather than `macos-latest`: every artifact we produce is
    # arm64-only, and `swiftc` on an Intel host would default to
    # x86_64 and silently build a binary that fails to link against
    # the aarch64 staticlib. An `uname -m` assertion below turns a
    # future runner-image tier change into a loud early failure.
    # Single job (no matrix) ã the cross-compile builds are serial
    # inside the recipe; matrix wouldn't help because the final
    # xcodebuild step needs every slice in one workspace.
    #
    # The workflow-level `RUSTFLAGS: ""` env override is critical for
    # the macOS slice: `.cargo/config.toml` sets target-cpu=native
    # for the apple-darwin triple (workstation dev convenience), but
    # a CI runner's "native" CPU isn't a portable shipped-binary
    # baseline. Empty RUSTFLAGS forces the generic apple-darwin
    # baseline for distribution.
    name: Apple XCFramework
    needs: check
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly-2026-04-02
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Show runner info
        # Xcode version: diagnostic ã the `macos-15` pin tracks an
        # image version, not a frozen Xcode version, so logging
        # catches silent xcodebuild behavior changes.
        #
        # `uname -m` assertion: every output of this job is arm64-
        # only. If a future `macos-15` image tier adds an Intel
        # host variant (or if we ever point back at `macos-latest`),
        # this fails fast with an actionable error instead of
        # silently producing a mislinked Swift binary against the
        # aarch64 staticlib.
        run: |
          set -euo pipefail
          xcodebuild -version
          uname -m
          ARCH=$(uname -m)
          if [ "$ARCH" != "arm64" ]; then
            echo "::error::expected arm64 host for arm64-only cross-compile, got '$ARCH' ã pin runs-on to an Apple Silicon label" >&2
            exit 1
          fi
      - name: Build XCFramework
        # Mirrors `just apple-xcframework` exactly. Inlined because the
        # CI runner doesn't have `just` installed by default and
        # adding a setup-just step for a single-recipe job would be
        # more weight than the recipe itself.
        run: |
          set -euo pipefail
          cargo build -p wick-ffi --target aarch64-apple-ios --release
          cargo build -p wick-ffi --target aarch64-apple-ios-sim --release
          cargo build -p wick-ffi --target aarch64-apple-darwin --release
          OUT=target/xcframework-build
          rm -rf "$OUT"
          mkdir -p "$OUT/headers"
          cp wick-ffi/bindings/swift/wick_ffiFFI.h "$OUT/headers/"
          cp wick-ffi/bindings/swift/wick_ffiFFI.modulemap "$OUT/headers/module.modulemap"
          xcodebuild -create-xcframework \
              -library target/aarch64-apple-ios/release/libwick_ffi.a -headers "$OUT/headers" \
              -library target/aarch64-apple-ios-sim/release/libwick_ffi.a -headers "$OUT/headers" \
              -library target/aarch64-apple-darwin/release/libwick_ffi.a -headers "$OUT/headers" \
              -output "$OUT/WickFFI.xcframework"
      - name: Log XCFramework size
        # Logs the per-slice + total size so a future regression where
        # debuginfo slips back in (or a heavyweight dep accidentally
        # gets feature-gated on) shows up as a number in the build
        # log. No hard threshold ã adjust when intentional size
        # changes happen.
        run: |
          set -euo pipefail
          XCF=target/xcframework-build/WickFFI.xcframework
          du -sh "$XCF"
          du -sh "$XCF"/*/libwick_ffi*.a
      - name: Swift smoke test (macOS)
        # Validates the entire pipeline end-to-end: compiles a small
        # Swift program against the freshly-built macOS staticlib +
        # the vendored Swift binding, runs it, asserts every surface
        # area we expect to work works (function call, enum
        # marshaling, record construction, error round-trip).
        #
        # Why macOS only: the Rust FFI surface is identical across
        # iOS device, iOS Simulator, and native macOS ã same
        # generated Swift binding, same C ABI, same staticlib code
        # path. Running a native macOS test exercises the entire
        # cross-language integration without paying for an iOS
        # simulator boot. A regression that broke iOS specifically
        # (e.g., a platform-conditional staticlib symbol) wouldn't
        # be caught here, but those have not been a real failure
        # mode for UniFFI 0.31.
        #
        # `-import-objc-header` exposes the C declarations from
        # `wick_ffiFFI.h` without needing a separate module map +
        # SPM ceremony for a single-binary test. Foundation auto-
        # links on Apple platforms.
        run: |
          set -euo pipefail
          swiftc \
              wick-ffi/tests/swift/main.swift \
              wick-ffi/bindings/swift/wick_ffi.swift \
              -import-objc-header wick-ffi/bindings/swift/wick_ffiFFI.h \
              -L target/aarch64-apple-darwin/release \
              -lwick_ffi \
              -o /tmp/wick-swift-smoke
          /tmp/wick-swift-smoke
      - name: Verify XCFramework slices
        # Catches a regression where one slice silently has the wrong
        # architecture or platform ã `Info.plist` advertises
        # `SupportedPlatform` + `SupportedPlatformVariant` +
        # `SupportedArchitectures`, all three must match what we
        # intended to build. Same exhaustive-check discipline as the
        # Android ABI matrix's `readelf` assertion.
        #
        # `SupportedPlatform == "ios"` is a critical guard: without
        # it, a misconfigured cross-compile that produced a macOS
        # staticlib (`aarch64-apple-darwin`) could still satisfy the
        # arch + variant checks since macOS arm64 staticlibs declare
        # the same architecture. The `==` on platform forces the
        # iOS-specific path.
        run: |
          set -euo pipefail
          XCF=target/xcframework-build/WickFFI.xcframework
          test -d "$XCF" || { echo "::error::xcframework not built"; exit 1; }
          plutil -p "$XCF/Info.plist"
          plutil -convert json -o - "$XCF/Info.plist" | python3 -c '
          import json, sys
          info = json.load(sys.stdin)
          libs = info["AvailableLibraries"]
          if len(libs) != 3:
              print(f"::error::expected 3 slices, got {len(libs)}", file=sys.stderr); sys.exit(1)
          # Build a set of (platform, archs-sorted-tuple, variant) keys
          # and check both expected slices are present. (*archs,
          # variant) avoids a tuple-concat dance that earlier readers
          # misread as a syntax bug.
          actual = {(l["SupportedPlatform"], *sorted(l["SupportedArchitectures"]), l.get("SupportedPlatformVariant", "")) for l in libs}
          expected = {
              ("ios",   "arm64", ""),          # iOS device
              ("ios",   "arm64", "simulator"), # iOS Simulator (Apple Silicon Mac host)
              ("macos", "arm64", ""),          # native Apple Silicon Mac
          }
          missing = expected - actual
          extra = actual - expected
          if missing or extra:
              print(f"::error::xcframework slices mismatch", file=sys.stderr)
              print(f"  expected: {expected}", file=sys.stderr)
              print(f"  actual:   {actual}", file=sys.stderr)
              if missing: print(f"  missing:  {missing}", file=sys.stderr)
              if extra:   print(f"  extra:    {extra}", file=sys.stderr)
              sys.exit(1)
          print("xcframework slices OK: ios-arm64 + ios-arm64-simulator + macos-arm64")
          '
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wick-ffi-apple-xcframework
          # Upload the directory (xcframework is a folder bundle on
          # disk); actions/upload-artifact zips it transparently.
          path: target/xcframework-build/WickFFI.xcframework
          retention-days: 7

  integration-test:
    name: Integration Tests (gated)
    needs: check
    # Only run on main-branch pushes and manual dispatch. Skipping PR runs
    # keeps PR cycle latency low ã these tests download ~210 MB and are
    # meant as a correctness backstop, not per-PR regression guardrail.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # Cap at 30 min. PR #58's fixture swap (LFM2-1.2B ã 350M-Extract)
    # cut bundle_download from 31s ã 11s and bundle_from_id stays sub-
    # second, but `shift_real_model` does ~457 tokens of prefill across
    # 16 attention layers + the post-shift K re-rotation work, which
    # ran ~14 min on the 2-core Ubuntu runner with `ubatch_size:0`
    # before BLAS was wired up here. With `--features blas` + OpenBLAS
    # installed below (this PR's scope), the batched prefill path now
    # routes QûKÃç / AV / FFN matmuls through OpenBLAS's `cblas_sgemm`
    # instead of the per-token scalar fallback x86_64 used to hit. The
    # 30-min cap stays as a safety net while we measure the actual
    # post-merge speedup.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly-2026-04-02
      - uses: Swatinem/rust-cache@v2
      # OpenBLAS provides cblas_sgemm for the wick `blas` feature
      # (linked via `openblas-src` / `cblas-sys`, see wick/Cargo.toml).
      # On x86_64 this is the actual SGEMM impl behind
      # `try_blas_prefill_gemm` ã meaningful only after this PR lifted
      # the `cfg(target_arch = "aarch64")` gate that previously made
      # `--features blas` a no-op on this runner.
      - name: Install OpenBLAS
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev
      - name: Cache downloaded test models
        uses: actions/cache@v4
        with:
          path: target/tmp/wick-test-models
          # Bump the key suffix to invalidate after model-file changes.
          # `v2`: switched fixture to LFM2-350M-Extract Q4_0 (~210 MB)
          # from LFM2-1.2B Q4_0 (~700 MB) ã the 1.2B was timing out the
          # job's 15-minute cap on Ubuntu CPU runners (~13 min runtime
          # for `shift_real_model` alone).
          key: wick-test-models-lfm2-350m-extract-q4_0-v2
      # NOTE: targeted to the download-gated test binaries only.
      # `cargo test -- --ignored` without `--test` would sweep every
      # #[ignore]'d test in the workspace (Metal microbenchmarks,
      # parity tests requiring WICK_TEST_MODEL, etc.), most of which
      # don't belong on an Ubuntu CI runner. `--features remote,blas`:
      # `remote` for the bundle downloader + cache shim, `blas` to
      # route SGEMM through OpenBLAS instead of the scalar fallback.
      # `blas_correctness` is the new oracle that asserts BLAS-on-
      # x86_64 produces tokens identical to the aarch64+blas reference;
      # if it fails on Ubuntu CI but passes on macOS, we have a
      # platform-specific BLAS bug to chase.
      - name: Run gated integration tests
        env:
          WICK_TEST_DOWNLOAD: "1"
        run: |
          cargo test -p wick --features remote,blas \
            --test shift_real_model \
            --test bundle_download \
            --test bundle_from_id \
            --test blas_correctness \
            -- --ignored

  parity-test:
    name: Parity Harness (gated)
    needs: check
    # Same gating shape as `integration-test`: main-branch pushes +
    # manual dispatch only. PR runs would pay a 200 MB cold-cache
    # download for a regression check the FFI unit tests already
    # cover; this job's value lives at the rustãkotlin boundary that
    # the Kotlin leg (PR 16) exercises. The Swift leg runs in the
    # parallel `parity-test-swift` job below on a macOS runner.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly-2026-04-02
      - uses: Swatinem/rust-cache@v2
      # JDK 21 (Temurin) for the Kotlin runner. The wick ecosystem
      # baselines on JDK 21 (per the user's global CLAUDE.md note that
      # the SDKMAN current may drift to a newer Java that breaks
      # plugins). Using `setup-java`'s built-in Gradle caching lets the
      # second-and-later runs skip the dependency download.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Cache downloaded parity fixtures
        uses: actions/cache@v4
        with:
          # Distinct from `wick-test-models` so a fixture rotation in
          # one suite doesn't invalidate the other. Bump the key suffix
          # when the bundle id / quant in `wick-parity/tests/parity.rs`
          # changes. The macOS swift parity job uses the same key
          # value but lives in a separate (OS-segregated) cache pool.
          path: target/tmp/wick-parity-cache
          key: wick-parity-cache-lfm2-350m-q4_0-v1
      # The Kotlin leg loads `libwick_ffi.so` through JNA. Build the
      # cdylib first so JNA's `-Djna.library.path` (set on the
      # subprocess via `--lib-dir`) finds something to load.
      # `--release`: the harness below runs in `--release`; loading a
      # debug cdylib here would compare release rust vs debug FFI
      # native code ã apples to oranges, and would make the kotlin
      # leg look 5-10û slower than reality.
      - name: Build wick-ffi cdylib (release)
        run: cargo build --release -p wick-ffi
      # Build the Kotlin runner fat jar. `--no-daemon` is the right
      # default for CI (single-shot invocation; daemon adds startup
      # cost and disk usage that doesn't pay off across runs).
      - name: Build kotlin-jna runner
        working-directory: wick-parity/legs/kotlin
        run: ./gradlew --no-daemon shadowJar
      # `cargo run check` does both jobs the integration tests
      # used to do ã token equality across legs (rust ã ffi ã
      # kotlin-jna) and per-leg wall-clock with a threshold gate.
      # `--release` matters: a debug build of wick is ~10û slower
      # at LFM2 prefill, which would dominate the timing data and
      # turn the perf table into noise.
      #
      # Threshold: `--max-slowdown 30` is sized from local M-class
      # measurements (kotlin-jna runs 10-12û rust on a warm cache)
      # plus a generous CI margin (cold caches + 2-core x86_64
      # runner hit harder). If post-merge runs show a tighter
      # steady-state, drop the threshold; if real CI variance
      # rides it close, raise it. Per-leg-class thresholds (e.g.
      # 2û for ffi, 30û for subprocess) are out of scope here ã
      # tracked as future work in devlog 000062.
      #
      # `--fail-on-slowdown` makes a breach exit non-zero so the
      # gate is load-bearing. The same invocation also gates
      # token equality (exit 1 on divergence) ã replaces the old
      # `cargo test --tests --ignored` step.
      # `WICK_PARITY_RUN` is intentionally NOT set here ã the
      # `wick-parity check` CLI invocation doesn't read it (that env
      # var only gates the `#[ignore]`'d cargo-test integration
      # tests). Including it would imply the CLI cares about it.
      - name: Run parity harness with perf gate
        run: |
          cargo run --release -p wick-parity -- check \
            --bundle LFM2-350M-Extract-GGUF --quant Q4_0 \
            --prompt "The capital of France is" \
            --max-tokens 16 --seed 0 \
            --kotlin-runner ${{ github.workspace }}/wick-parity/legs/kotlin/build/libs/wick-parity-kotlin-all.jar \
            --lib-dir ${{ github.workspace }}/target/release \
            --max-slowdown 30 \
            --fail-on-slowdown

  parity-test-swift:
    name: Parity Harness Swift (gated)
    needs: check
    # Same gating shape as `parity-test`: main-branch pushes + manual
    # dispatch only. Apple runners are billed at higher per-minute
    # rates, so this gate is doubly worth it on macOS.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    # macos-26 = Apple Silicon Tahoe runner image. Swift on macOS is
    # the natural toolchain; Swift on Linux works too but the
    # toolchain weight isn't worth the marginal coverage ã the
    # kotlin leg already exercises the FFI surface on Ubuntu.
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly-2026-04-02
      - uses: Swatinem/rust-cache@v2
      - name: Cache downloaded parity fixtures
        uses: actions/cache@v4
        with:
          # Same key as `parity-test`'s ubuntu run; GitHub's cache
          # is OS-segregated so they live in separate pools and the
          # 210 MB fixture downloads at most once per OS per run.
          path: target/tmp/wick-parity-cache
          key: wick-parity-cache-lfm2-350m-q4_0-v1
      # SPM build cache. Keyed on Package.swift + the two binding
      # files (which are git-tracked symlinks but their content
      # hashes change when `just bindings` regenerates upstream).
      # Cold `swift build` takes 10-30s on macos-26; cache hits
      # drop the runner-build step to <1s.
      - name: Cache SPM build artifacts
        uses: actions/cache@v4
        with:
          path: wick-parity/legs/swift/.build
          key: wick-parity-swift-spm-${{ hashFiles('wick-parity/legs/swift/Package.swift', 'wick-ffi/bindings/swift/wick_ffi.swift', 'wick-ffi/bindings/swift/wick_ffiFFI.h') }}
      # The Swift leg links against `libwick_ffi.dylib` at build time.
      # The binary records an absolute install_name pointing at the
      # cdylib's build-time location under `target/release/` in this
      # same checkout, so dyld can find the dylib by that path alone.
      # We also export `DYLD_LIBRARY_PATH` at run time as a robustness
      # measure ã dyld checks it before falling through to install_name
      # lookup, so a moved-or-renamed cdylib still resolves as long
      # as a same-basename match exists in the directory passed via
      # the `--lib-dir` flag below (the rust harness translates that
      # to `DYLD_LIBRARY_PATH` on the spawned subprocess).
      # Build the cdylib first so the `swift build -Xlinker -L<dir>`
      # step has something to link against. `--release` matters: the
      # harness below runs in `--release`; loading a debug cdylib
      # would compare release rust vs debug FFI native code (apples
      # to oranges) and inflate the swift slowdown ratio.
      - name: Build wick-ffi cdylib (release)
        run: cargo build --release -p wick-ffi
      # `swift build -c release -Xlinker -L<dir>` produces
      # `.build/release/WickParitySwift`. `-Xlinker -L<dir>` is the
      # SPM-portable way to add a library search path; `LDFLAGS` is
      # not honored consistently by `swift build`. Linking against
      # `target/release` matches the `cargo build --release -p wick-ffi`
      # output so install_name + runtime DYLD_LIBRARY_PATH agree.
      - name: Build swift-uniffi runner
        working-directory: wick-parity/legs/swift
        run: |
          swift build -c release \
            -Xlinker -L${{ github.workspace }}/target/release
      # `cargo run check --fail-on-slowdown` does token equality
      # AND perf-threshold gating in one pass ã same shape as the
      # ubuntu kotlin-jna gate above. See that job's comment for
      # the threshold rationale; same `30û` value applies here
      # because swift-uniffi has shown nearly identical
      # subprocess overhead to kotlin-jna on local M-class runs
      # (10.5ûã12û kotlin-jna vs 10.9ûã12.3û swift-uniffi at the
      # `wick-parity check` defaults).
      #
      # `WICK_PARITY_RUN` is intentionally NOT set here ã the
      # `wick-parity check` CLI invocation doesn't read it (that env
      # var only gates the `#[ignore]`'d cargo-test integration
      # tests).
      - name: Run parity harness with perf gate
        run: |
          cargo run --release -p wick-parity -- check \
            --bundle LFM2-350M-Extract-GGUF --quant Q4_0 \
            --prompt "The capital of France is" \
            --max-tokens 16 --seed 0 \
            --swift-runner ${{ github.workspace }}/wick-parity/legs/swift/.build/release/WickParitySwift \
            --lib-dir ${{ github.workspace }}/target/release \
            --max-slowdown 30 \
            --fail-on-slowdown
