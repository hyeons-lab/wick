[package]
name = "wick-ffi"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "UniFFI bindings for wick — exposes the core inference engine to Kotlin, Swift, Python, etc."

[lib]
# - `cdylib` for Android / Linux / macOS dynamic linking (UniFFI loadBundle at runtime).
# - `staticlib` for iOS (XCFramework static archive, Swift Package Manager).
# - `lib` stays so other Rust crates in the workspace (future parity
#   harness, examples) can depend on the crate as a normal library.
crate-type = ["lib", "cdylib", "staticlib"]

[dependencies]
uniffi.workspace = true
# wick: depend on default features for the core surface we expose. The
# `remote` feature is opt-in at this layer — adding it when/if `wick-ffi`
# exposes `BundleRepo` (PR 2+). Keeping it out now keeps the bootstrap
# dep-tree small.
wick = { path = "../wick" }

[build-dependencies]
uniffi = { workspace = true, features = ["build"] }
